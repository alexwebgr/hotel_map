<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Survey</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #01696f; --primary-h: #0c4e54;
      --surface: #fff; --bg: #f7f6f2;
      --border: #dcd9d5; --text: #28251d;
      --muted: #7a7974; --faint: #bab9b4; --error: #a13544;
      --font: 'Satoshi','Inter',sans-serif;
      --shadow: 0 4px 16px rgba(0,0,0,0.15);
      --t: 180ms cubic-bezier(0.16,1,0.3,1);
    }
    html, body { height: 100%; font-family: var(--font); overflow: hidden; }
    #map { position: fixed; inset: 0; cursor: crosshair; }

    .layers {
      position: fixed; top: 1rem; left: 1rem; z-index: 1000;
      background: var(--surface); border-radius: 0.625rem;
      box-shadow: var(--shadow); display: flex; overflow: hidden;
    }
    .layer-btn {
      padding: 0.5rem 0.875rem; border: none; background: transparent;
      font-family: var(--font); font-size: 0.78rem; font-weight: 600;
      color: var(--muted); cursor: pointer; transition: all var(--t); white-space: nowrap;
    }
    .layer-btn + .layer-btn { border-left: 1px solid var(--border); }
    .layer-btn.active { background: var(--primary); color: #fff; }

    .panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: var(--surface); border-radius: 1.25rem 1.25rem 0 0;
      box-shadow: var(--shadow); padding: 1rem 1rem 1.75rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .handle { width: 36px; height: 4px; background: var(--border); border-radius: 9999px; margin: 0 auto; }
    .chips { display: flex; gap: 0.5rem; overflow-x: auto; scrollbar-width: none; min-height: 28px; align-items: center; }
    .chips::-webkit-scrollbar { display: none; }
    .empty { font-size: 0.78rem; color: var(--faint); }
    .chip {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.7rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 9999px; font-size: 0.75rem; font-weight: 600;
      white-space: nowrap; cursor: pointer; flex-shrink: 0;
      transition: all var(--t); color: var(--text);
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); }
    .chip-x {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--faint); color: #fff; font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--t);
    }
    .chip:hover .chip-x { background: var(--error); }
    .export-btn {
      width: 100%; padding: 0.75rem; background: transparent;
      border: 1.5px solid var(--border); border-radius: 0.5rem;
      font-family: var(--font); font-size: 0.875rem; font-weight: 500;
      color: var(--text); cursor: pointer; transition: all var(--t);
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .export-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .export-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .backdrop {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(40,37,29,0.45); backdrop-filter: blur(2px);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%; background: var(--surface);
      border-radius: 1.25rem 1.25rem 0 0;
      padding: 1.25rem 1.25rem 2.5rem;
      display: flex; flex-direction: column; gap: 1rem;
      transform: translateY(16px);
      transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    .backdrop.open .modal { transform: translateY(0); }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-coords { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
    .modal-input {
      padding: 0.875rem 1rem; border: 1.5px solid var(--border);
      border-radius: 0.5rem; font-family: var(--font);
      font-size: 1rem; font-weight: 500; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color var(--t), box-shadow var(--t);
    }
    .modal-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(1,105,111,0.15); }
    .modal-input::placeholder { color: var(--faint); font-weight: 400; }
    .modal-btns { display: flex; gap: 0.5rem; }
    .btn-ok {
      flex: 1; padding: 0.8rem; background: var(--primary); color: #fff;
      border: none; border-radius: 0.5rem; font-family: var(--font);
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background var(--t);
    }
    .btn-ok:hover { background: var(--primary-h); }
    .btn-no {
      padding: 0.8rem 1.25rem; background: transparent;
      border: 1.5px solid var(--border); border-radius: 0.5rem;
      font-family: var(--font); font-size: 0.9rem; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: all var(--t);
    }
    .btn-no:hover { border-color: var(--text); color: var(--text); }

    .toast {
      position: fixed; top: 1rem; left: 50%;
      transform: translateX(-50%) translateY(-6px);
      z-index: 3000; background: var(--text); color: #fff;
      padding: 0.5rem 1rem; border-radius: 9999px;
      font-size: 0.8rem; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .leaflet-popup-content-wrapper { border-radius: 0.625rem; font-family: var(--font); padding: 0; overflow: hidden; box-shadow: var(--shadow); }
    .leaflet-popup-content { margin: 0; }
    .pi { padding: 0.65rem 0.9rem; }
    .pi-name { font-weight: 700; font-size: 0.9rem; }
    .pi-coords { color: var(--muted); font-size: 0.7rem; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

<div id="map"></div>

<div class="layers">
  <button class="layer-btn active" id="btn-satellite" onclick="setLayer('satellite')">Satellite</button>
  <button class="layer-btn" id="btn-hybrid" onclick="setLayer('hybrid')">Hybrid</button>
  <button class="layer-btn" id="btn-street" onclick="setLayer('street')">Street</button>
</div>

<div class="panel">
  <div class="handle"></div>
  <div class="chips" id="chips"><span class="empty">Click the map to place a room pin</span></div>
  <button class="export-btn" id="exportBtn" disabled onclick="doExport()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export GeoJSON
  </button>
</div>

<div class="backdrop" id="backdrop">
  <div class="modal">
    <div>
      <div class="modal-title">Name this room</div>
      <div class="modal-coords" id="coords"></div>
    </div>
    <input class="modal-input" id="nameInput" type="text" placeholder="e.g. 101, Reception, Pool Bar…" autocomplete="off" spellcheck="false"/>
    <div class="modal-btns">
      <button class="btn-no" onclick="cancel()">Cancel</button>
      <button class="btn-ok" onclick="confirm()">Place Pin</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const tileLayers = {
    satellite: L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
      subdomains: ['0','1','2','3'], maxZoom: 21, maxNativeZoom: 21, attribution: '© Google'
    }),
    hybrid: L.tileLayer('https://mt{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
      subdomains: ['0','1','2','3'], maxZoom: 21, maxNativeZoom: 21, attribution: '© Google'
    }),
    street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 21, maxNativeZoom: 19, attribution: '© OpenStreetMap'
    })
  };

  const map = L.map('map', { zoomControl: true, layers: [tileLayers.satellite] })
          .setView([35.5138, 24.0180], 18);

  let currentLayer = 'satellite';
  function setLayer(name) {
    map.removeLayer(tileLayers[currentLayer]);
    map.addLayer(tileLayers[name]);
    currentLayer = name;
    document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + name).classList.add('active');
  }

  navigator.geolocation && navigator.geolocation.getCurrentPosition(
          p => map.setView([p.coords.latitude, p.coords.longitude], 19),
          () => {}, { enableHighAccuracy: true, timeout: 8000 }
  );

  let rooms = [], pending = null, ghostMarker = null;

  map.on('click', e => openModal(e.latlng.lat, e.latlng.lng));

  function openModal(lat, lng) {
    pending = { lat, lng };
    document.getElementById('coords').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    document.getElementById('nameInput').value = '';
    document.getElementById('backdrop').classList.add('open');
    if (ghostMarker) map.removeLayer(ghostMarker);
    ghostMarker = L.circleMarker([lat, lng], {
      radius: 6, color: '#01696f', fillColor: '#01696f', fillOpacity: 0.45, weight: 2
    }).addTo(map);
    setTimeout(() => document.getElementById('nameInput').focus(), 260);
  }

  function cancel() {
    document.getElementById('backdrop').classList.remove('open');
    if (ghostMarker) { map.removeLayer(ghostMarker); ghostMarker = null; }
    pending = null;
  }

  function confirm() {
    const raw = document.getElementById('nameInput').value.trim();
    const name = raw || `Room ${rooms.length + 1}`;
    const { lat, lng } = pending;
    const n = rooms.length + 1;
    const marker = L.marker([lat, lng], {
      icon: L.divIcon({
        className: '',
        html: `<div style="width:28px;height:28px;background:#01696f;border:2.5px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.3)"><span style="transform:rotate(45deg);color:#fff;font-size:10px;font-weight:700;font-family:Satoshi,sans-serif">${n}</span></div>`,
        iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-32]
      })
    }).addTo(map);
    marker.bindPopup(`<div class="pi"><div class="pi-name">${name}</div><div class="pi-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div></div>`);
    rooms.push({ name, lat, lng, marker });
    if (ghostMarker) { map.removeLayer(ghostMarker); ghostMarker = null; }
    document.getElementById('backdrop').classList.remove('open');
    pending = null;
    renderChips();
    document.getElementById('exportBtn').disabled = false;
    toast(`${name} pinned`);
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirm();
    if (e.key === 'Escape') cancel();
  });
  document.getElementById('backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('backdrop')) cancel();
  });

  function renderChips() {
    const el = document.getElementById('chips');
    if (!rooms.length) { el.innerHTML = '<span class="empty">Click the map to place a room pin</span>'; return; }
    el.innerHTML = rooms.map((r,i) => `
    <div class="chip" onclick="flyTo(${i})">
      ${r.name}
      <span class="chip-x" onclick="event.stopPropagation();del(${i})">✕</span>
    </div>`).join('');
  }

  function flyTo(i) {
    map.flyTo([rooms[i].lat, rooms[i].lng], 20, { duration: 0.7 });
    rooms[i].marker.openPopup();
  }

  function del(i) {
    map.removeLayer(rooms[i].marker);
    rooms.splice(i, 1);
    renderChips();
    if (!rooms.length) document.getElementById('exportBtn').disabled = true;
    toast('Pin removed');
  }

  function doExport() {
    const gj = {
      type: 'FeatureCollection',
      features: rooms.map(r => ({
        type: 'Feature',
        properties: { name: r.name },
        geometry: { type: 'Point', coordinates: [r.lng, r.lat] }
      }))
    };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(gj, null, 2)], { type: 'application/json' }));
    a.download = 'rooms.geojson';
    a.click();
    toast('rooms.geojson downloaded');
  }

  let tt;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
