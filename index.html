<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Survey</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div id="map"></div>

<div class="layers">
  <button class="layer-btn active" id="btn-satellite" onclick="setLayer('satellite')">Satellite</button>
  <button class="layer-btn" id="btn-hybrid" onclick="setLayer('hybrid')">Hybrid</button>
  <button class="layer-btn" id="btn-street" onclick="setLayer('street')">Street</button>
</div>

<div class="panel">
  <div class="handle"></div>
  <div class="chips" id="chips"><span class="empty">Click the map to place a room pin</span></div>
  <button class="export-btn" id="exportBtn" disabled onclick="doExport()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export GeoJSON
  </button>
</div>

<div class="backdrop" id="backdrop">
  <div class="modal">
    <div>
      <div class="modal-title">Name this room</div>
      <div class="modal-coords" id="coords"></div>
    </div>
    <input class="modal-input" id="nameInput" type="text" placeholder="e.g. 101, Reception, Pool Bar…" autocomplete="off" spellcheck="false"/>
    <div class="modal-btns">
      <button class="btn-no" onclick="cancel()">Cancel</button>
      <button class="btn-ok" onclick="confirm()">Place Pin</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
