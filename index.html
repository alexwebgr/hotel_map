<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Map</title>
  <link rel="stylesheet" href="vendor/leaflet.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="vendor/leaflet.js"></script>
</head>
<body>

<div id="map"></div>

<!-- Top left: layer cycle + add pins -->
<div class="top-left">
  <button class="ctrl-btn" id="layerBtn">Hybrid</button>
  <button class="ctrl-btn" id="addPinBtn" style="display:none">Add Pins</button>
</div>

<!-- Top center: search -->
<div class="search-container">
  <input type="text" class="search-input" id="searchInput" placeholder="Search pins…">
</div>

<!-- Top right: show pins, login -->
<div class="top-right">
  <button class="ctrl-btn" id="show-pins-btn" style="display:none">Show Pins</button>
  <button class="ctrl-btn" id="auth-toggle">Login</button>
</div>

<!-- Collapsible sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Pins</span>
    <button class="sidebar-close" id="sidebarToggle">&times;</button>
  </div>
  <div class="sidebar-content" id="sidebarContent">
    <span class="empty">No pins yet</span>
  </div>
  <div class="sidebar-footer">
    <input type="file" id="importInput" accept=".geojson,.json" style="display:none">
    <button class="sidebar-btn" id="importBtn">Import GeoJSON</button>
    <button class="sidebar-btn sidebar-btn-primary" id="exportBtn">Export GeoJSON</button>
  </div>
</div>

<!-- Add pin modal -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-title">Add Pin</div>
    <div class="modal-row">
      <select class="modal-input" id="pinTypeSelect">
        <option value="rooms">Rooms</option>
        <option value="pool">Pool</option>
        <option value="bar">Bar</option>
        <option value="reception">Reception</option>
        <option value="restaurant">Restaurant</option>
        <option value="gym">Gym</option>
      </select>
      <input class="modal-input modal-name" id="nameInput" type="text" placeholder="Name" autocomplete="off" spellcheck="false"/>
      <button class="btn-ok" id="submitBtn">Submit</button>
      <button class="btn-no" id="cancelBtn">Cancel</button>
    </div>
    <div class="modal-coords" id="coords"></div>
  </div>
</div>

<button class="locate-btn" id="locateBtn" title="Go to my location">
  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
    <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    <circle cx="12" cy="12" r="7"/>
  </svg>
</button>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
